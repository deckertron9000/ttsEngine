name: Build and Sign APK

on:
  push:
    tags:
      - 'V*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to use for release name'
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          APK_NAME: ${{ vars.APK_NAME }}
        run: |
          echo "$SIGNING_KEYSTORE_B64" | base64 --decode > /tmp/release.jks

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -V | tail -1)

          APK=app/build/outputs/apk/release/app-release-unsigned.apk

          "$APKSIGNER" sign \
            --ks /tmp/release.jks \
            --ks-pass "pass:$SIGNING_PASSWORD" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass "pass:$SIGNING_PASSWORD" \
            "$APK"

          rm /tmp/release.jks

          mv "$APK" "$APK_NAME"

      - name: Get version info for release tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG=${GITHUB_REF#refs/tags/}
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "$GITHUB_REF" ]; then
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "manual-build")
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$TAG" >> $GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: "Auto-built and signed from upstream tag ${{ steps.version.outputs.tag }}"
          files: ${{ vars.APK_NAME }}
          make_latest: true
