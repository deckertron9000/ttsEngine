name: Build and Sign APK

on:
  push:
    branches: [master]    # trigger on every push to master
  workflow_dispatch:       # allow manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-24.04   # pinned — avoids surprises when GitHub bumps 'latest'

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # checks out your fork

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'         # current LTS, fully supported by AGP 8.x/9.x
          distribution: 'temurin'
          cache: gradle              # cache gradle deps between runs

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease   # produces app-release-unsigned.apk

      - name: Sign APK
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          APK_NAME: ${{ vars.APK_NAME }}
        run: |
          # decode keystore from base64 secret into a temp file
          echo "$SIGNING_KEYSTORE_B64" | base64 --decode > /tmp/release.jks

          # use build-tools 34 — newer versions produce APKs incompatible with apksigcopier
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"

          APK=app/build/outputs/apk/release/app-release-unsigned.apk

          # sign in-place — no unsigned and signed APK coexisting on the runner
          "$APKSIGNER" sign \
            --ks /tmp/release.jks \
            --ks-pass "pass:$SIGNING_STORE_PASSWORD" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass "pass:$SIGNING_KEY_PASSWORD" \
            "$APK"

          # clean up keystore immediately after use
          rm /tmp/release.jks

          # rename for clarity in the release assets
          # APK_NAME is a repository variable: Settings -> Secrets and variables -> Actions -> Variables
          mv "$APK" "$APK_NAME"

      - name: Get version info for release tag
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)   # e.g. f174246
          DATE=$(date -u '+%Y%m%d')                 # e.g. 20260405
          echo "tag=build-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Build ${DATE} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}    # unique per build, sorts correctly
          name: ${{ steps.version.outputs.name }}
          body: "Auto-built and signed from master"
          files: ${{ vars.APK_NAME }}
          make_latest: true                             # Obtainium will find this as latest
